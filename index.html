<style>
  /* ...既存のスタイル... */
  .class-tab-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .class-tab { padding: 10px 20px; background: #eee; border-radius: 20px; cursor: pointer; font-weight: bold; }
  .class-tab.active { background: var(--primary); color: white; }
  .name-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .name-grid.active { display: grid; }
</style>

<div class="manual-section">
  <div class="section-title">手動登録（クラスを選択してください）</div>
  <div id="class-tabs" class="class-tab-container">読み込み中...</div>
  <div id="name-containers"></div>
</div>

<script>
  const GAS_URL = "あなたのGASのURL"; // ★必ず更新してデプロイ！

  function sendData(className, name) {
    const card = document.getElementById('status-card');
    card.innerText = `送信中: ${name}...`;
    fetch(`${GAS_URL}?className=${encodeURIComponent(className)}&name=${encodeURIComponent(name)}`)
      .then(res => res.json())
      .then(data => {
        card.innerText = `【完了】${name}さん`;
        card.className = 'status-card success';
        setTimeout(() => { card.className = 'status-card'; card.innerText = "QRをかざしてください"; }, 3000);
      });
  }

  function loadRoster() {
    fetch(`${GAS_URL}?action=getRoster`)
      .then(res => res.json())
      .then(roster => {
        const tabContainer = document.getElementById('class-tabs');
        const nameContainer = document.getElementById('name-containers');
        tabContainer.innerHTML = '';
        nameContainer.innerHTML = '';

        // クラスごとに整理
        const groups = roster.reduce((acc, obj) => {
          if (!acc[obj.className]) acc[obj.className] = [];
          acc[obj.className].push(obj.name);
          return acc;
        }, {});

        Object.keys(groups).forEach((className, index) => {
          // クラスボタン作成
          const tab = document.createElement('div');
          tab.className = 'class-tab';
          tab.innerText = className;
          tab.onclick = () => {
            document.querySelectorAll('.class-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.name-grid').forEach(g => g.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('grid-' + index).classList.add('active');
          };
          tabContainer.appendChild(tab);

          // 名前ボタンのグリッド作成
          const grid = document.createElement('div');
          grid.id = 'grid-' + index;
          grid.className = 'name-grid';
          groups[className].forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'name-btn';
            btn.innerText = name;
            btn.onclick = () => { if(confirm(`${name}さんを受付しますか？`)) sendData(className, name); };
            grid.appendChild(btn);
          });
          nameContainer.appendChild(grid);
        });
      })
      .catch(err => {
        document.getElementById('class-tabs').innerText = "名簿の取得に失敗しました。GASのデプロイ設定を確認してください。";
      });
  }
  // window.onload で loadRoster() を実行
</script>
